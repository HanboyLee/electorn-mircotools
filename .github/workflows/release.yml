# CD — solo-trunk-cicd
# Triggers: push tag v* (e.g. v1.0.1), optional manual dispatch
# Merge/push to master alone does NOT publish installers

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v1.0.1). Leave empty to use package.json version as vX.Y.Z draft name.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Make (Electron Forge)
        run: npm run make

      - name: List make output
        shell: bash
        run: |
          if [ -d out/make ]; then
            find out/make -type f | head -100
          else
            echo "out/make missing"
            ls -la out || true
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-make
          path: out/make/**
          if-no-files-found: error
          retention-days: 14

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [ -z "$TAG" ]; then
              VER=$(node -p "require('./package.json').version")
              TAG="v${VER}"
            fi
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "is_tag_push=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "is_tag_push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          draft: ${{ steps.meta.outputs.is_tag_push != 'true' }}
          generate_release_notes: true
          files: |
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/*.msi
            out/make/**/*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
