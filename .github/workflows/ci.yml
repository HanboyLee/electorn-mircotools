# CI — solo-trunk-cicd
# Triggers: PR → master, push → master
# Does NOT publish installers (see release.yml + v* tags)

name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Existing codebase still has ESLint errors; report but do not block merge yet.
      # Tighten to required once `npm run lint` is clean.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      # Tests under **/__tests__/ are gitignored locally; --passWithNoTests keeps CI green
      # when no tests are in the remote tree. Prefer committing tests later for real coverage.
      - name: Test
        run: npm test
